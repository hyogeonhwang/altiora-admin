// ─── FIREBASE HELPERS ──────────────────────────────────────
function fbSave(path, val) {
  db.ref(path).set(val);
  render();
}

function deepGet(obj, path) {
  var parts = path.split("/");
  var cur = obj;
  for (var i = 0; i < parts.length; i++) {
    if (cur == null) return null;
    cur = cur[parts[i]];
  }
  return cur;
}

function deepSet(obj, path, val) {
  var parts = path.split("/");
  var cur = obj;
  for (var i = 0; i < parts.length - 1; i++) {
    if (!cur[parts[i]]) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = val;
}

function arrClone(v) { return JSON.parse(JSON.stringify(v || [])); }

// ─── INIT ──────────────────────────────────────────────────
function init() {
  db.ref("/").once("value", function(snap) {
    var val = snap.val();
    if (!val || !val.routines) {
      db.ref("/").set(DEF, function() {
        S.d = JSON.parse(JSON.stringify(DEF));
        S.loaded = true;
        render();
      });
    } else {
      S.d = val;
      S.loaded = true;
      render();
    }
  });
}

// ─── EVENT DELEGATION ──────────────────────────────────────
document.addEventListener("click", function(e) {
  var el = e.target;
  while (el && el !== document) {
    var act = el.dataset.act;
    if (act) { handleAction(act, el.dataset); return; }
    if (el.dataset.tab) { S.aTab = el.dataset.tab; render(); return; }
    if (el.dataset.reg) { S.regProg = el.dataset.reg; render(); return; }
    if (el.dataset.cat) { S.checkCat = el.dataset.cat; render(); return; }
    if (el.dataset.pay) { S.payS = el.dataset.pay; render(); return; }
    if (el.dataset.msg) { S.msgCat = el.dataset.msg; render(); return; }
    if (el.dataset.ref) { S.openRef = S.openRef === el.dataset.ref ? null : el.dataset.ref; render(); return; }
    if (el.dataset.ck)  { var k = el.dataset.ck; S.chk[k] = !S.chk[k]; render(); return; }
    if (el.dataset.rst) { Object.keys(S.chk).forEach(function(k){ if(k.indexOf(S.checkCat+"_")===0) delete S.chk[k]; }); render(); return; }
    if (el.dataset.cpy !== undefined) { copyMsg(parseInt(el.dataset.cpy)); return; }
    if (el.id === "editBtn") { S.editMode = !S.editMode; render(); return; }
    if (el.tagName === "A") return;
    el = el.parentElement;
  }
});

// ─── MODAL ─────────────────────────────────────────────────
var modalCb = null;

function openModal(title, fields, onSave) {
  modalCb = onSave;
  var fhtml = "";
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    fhtml += '<div class="modal-field"><label>' + f.label + '</label>';
    if (f.type === "text") {
      fhtml += '<input id="mf_' + f.id + '" type="text" value="' + escHtml(f.value || "") + '" placeholder="' + escHtml(f.ph || "") + '">';
    } else if (f.type === "textarea") {
      fhtml += '<textarea id="mf_' + f.id + '" placeholder="' + escHtml(f.ph || "") + '">' + escHtml(f.value || "") + '</textarea>';
    } else if (f.type === "color") {
      var colors = ["teal","blue","purple","amber","red","gray"];
      fhtml += '<div class="color-options" id="mf_' + f.id + '" data-val="' + (f.value||"teal") + '">';
      for (var j = 0; j < colors.length; j++) {
        var cname = colors[j];
        var c = SC[cname];
        fhtml += '<div class="color-opt' + (f.value === cname ? " selected" : "") + '" style="background:' + c.bg + ';border-color:' + c.b + '" data-color="' + cname + '" data-field="mf_' + f.id + '" onclick="pickColor(this)"></div>';
      }
      fhtml += '</div>';
    }
    fhtml += '</div>';
  }
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalFields").innerHTML = fhtml;
  document.getElementById("modalOverlay").classList.add("show");
  var firstInput = document.querySelector("#modalFields input, #modalFields textarea");
  if (firstInput) setTimeout(function(){ firstInput.focus(); }, 50);
}

function pickColor(el) {
  var fieldId = el.dataset.field;
  var container = document.getElementById(fieldId);
  container.dataset.val = el.dataset.color;
  var opts = container.querySelectorAll(".color-opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("selected");
  el.classList.add("selected");
}

function saveModal() {
  if (!modalCb) return;
  var fields = document.querySelectorAll("#modalFields [id^='mf_']");
  var vals = {};
  for (var i = 0; i < fields.length; i++) {
    var el = fields[i];
    var key = el.id.replace("mf_", "");
    if (el.classList.contains("color-options")) {
      vals[key] = el.dataset.val || "teal";
    } else {
      vals[key] = el.value;
    }
  }
  modalCb(vals);
  closeModal();
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("show");
  modalCb = null;
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
});

// ─── HELPERS ───────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function ectrls(actEdit, actDel, ds) {
  var attrs = "";
  var keys = Object.keys(ds);
  for (var i = 0; i < keys.length; i++) attrs += " data-" + keys[i] + '="' + escHtml(ds[keys[i]]) + '"';
  return '<div class="edit-ctrl">'
    + '<button class="eic" data-act="' + actEdit + '"' + attrs + ' title="수정">✏️</button>'
    + '<button class="eic del" data-act="' + actDel + '"' + attrs + ' title="삭제">🗑️</button>'
    + '</div>';
}

function addBtn(label, actName, ds) {
  var attrs = "";
  var keys = Object.keys(ds);
  for (var i = 0; i < keys.length; i++) attrs += " data-" + keys[i] + '="' + escHtml(ds[keys[i]]) + '"';
  return '<button class="add-btn" data-act="' + actName + '"' + attrs + '>' + label + '</button>';
}

function stepFlow(steps, actEdit, actDel, actAdd, dsBase, sm) {
  var h = '<div class="sflow">';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i], c = SC[s.c] || SC.gray;
    var sz = sm ? 24 : 30, fs = sm ? 11 : 12, pad = sm ? "8px 12px" : "10px 14px", br = sm ? 8 : 10;
    var mb = (i < steps.length - 1) ? ";margin-bottom:0" : "";
    h += '<div class="sitem">';
    h += '<div style="display:flex;flex-direction:column;align-items:center;width:' + sz + 'px;flex-shrink:0">';
    h += '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;font-weight:700;flex-shrink:0;background:' + c.bg + ';color:' + c.t + ';border:1.5px solid ' + c.b + '">' + (s.n || i + 1) + '</div>';

function extractDomain(url) {
  try {
    var m = url.match(/^https?:\/\/([^\/]+)/);
    return m ? m[1].replace("www.","") : url;
  } catch(e) { return url; }
}

// ─── COPY MSG ──────────────────────────────────────────────
function copyMsg(idx) {
  var msgs = S.d.messages[S.msgCat];
  if (!msgs || !msgs[idx]) return;
  var txt = msgs[idx].text;
  var btn = document.querySelector("[data-cpy='" + idx + "']");
  function fb() {
    if (btn) {
      btn.textContent = "✓ 복사됨!";
      btn.classList.add("ok");
      setTimeout(function(){ btn.textContent = "📋 복사"; btn.classList.remove("ok"); }, 1800);
    }
  }
  try {
    navigator.clipboard.writeText(txt).then(fb).catch(function(){
      var ta = document.createElement("textarea");
      ta.value = txt; ta.style.cssText = "position:fixed;left:-9999px;opacity:0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); fb();
    });
  } catch(x) {
    var ta = document.createElement("textarea");
    ta.value = txt; ta.style.cssText = "position:fixed;left:-9999px;opacity:0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); fb();
  }
}
