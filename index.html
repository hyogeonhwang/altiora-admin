*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Malgun Gothic','맑은 고딕',sans-serif;background:#f4f6f4;color:#1a1a1a;font-size:14px}
.app{max-width:960px;margin:0 auto}
.header{background:#fff;border-bottom:1px solid #dde8dd;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.hd-top{display:flex;align-items:center;gap:10px;padding:12px 0 6px}
.dot{width:9px;height:9px;border-radius:50%;background:#1D9E75}
.brand{font-size:13px;font-weight:700;color:#0F6E56}
.brand-sub{font-size:12px;color:#999;flex:1}
.edit-btn{padding:5px 14px;font-size:12px;font-weight:600;border-radius:20px;border:1px solid #ddd;background:transparent;cursor:pointer;font-family:inherit;color:#666;transition:all .15s}
.edit-btn.active{background:#FAEEDA;color:#854F0B;border-color:#EF9F27}
.tabs{display:flex;overflow-x:auto}
.tab{padding:8px 13px;font-size:13px;color:#777;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{color:#0F6E56;border-bottom-color:#1D9E75;font-weight:600}
.tab:hover:not(.active){color:#333}
.content{padding:20px;min-height:calc(100vh - 90px)}
.card{background:#fff;border-radius:12px;border:1px solid #e4e4e4;padding:16px}
.slbl{font-size:11px;font-weight:700;color:#999;letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase}
.stit{font-size:16px;font-weight:700;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.al{padding:11px 14px;border-radius:9px;font-size:12px;line-height:1.75}
.al-t{background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56}
.al-b{background:#E6F1FB;border:1px solid #85B7EB;color:#185FA5}
.al-a{background:#FAEEDA;border:1px solid #EF9F27;color:#854F0B}
.al-r{background:#FCEBEB;border:1px solid #f0a0a0;color:#A32D2D}

.sitem{display:flex;gap:12px;align-items:stretch;position:relative}
.sbody{flex:1;padding:10px 14px;background:#fff;border-radius:10px;border:1px solid #e8e8e8;margin-bottom:8px}

.step-title{font-size:13px;font-weight:700}
.step-desc{font-size:12px;color:#666;margin-top:3px;white-space:pre-line;line-height:1.7}
.segs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.seg{padding:5px 14px;font-size:12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:transparent;color:#666;font-family:inherit}
.seg.active{background:#E1F5EE;color:#0F6E56;border-color:#5DCAA5;font-weight:600}
.ci{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid #e8e8e8;cursor:pointer;background:#fff;margin-bottom:4px;position:relative}
.ci:hover{border-color:#5DCAA5}.ci.done{background:#E1F5EE;border-color:#5DCAA5}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;font-weight:700}
.cb.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ctxt{font-size:13px;line-height:1.5;flex:1}
.ctxt.done{text-decoration:line-through;opacity:.7;color:#0F6E56}
.pbar{height:5px;background:#eee;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px}
.achdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;border-radius:12px;background:#f9f9f9;border:1px solid #e8e8e8;margin-bottom:2px}
.achdr:hover{background:#f0f0f0}
.abody{background:#fff;border:1px solid #e8e8e8;border-top:none;border-radius:0 0 12px 12px;padding:4px 16px 12px}
.rrow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0;align-items:flex-start;position:relative}

.rval{font-size:12px;color:#1a1a1a;line-height:1.6;flex:1;display:flex;flex-direction:column;gap:4px}
.rlink{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56;text-decoration:none;border:1px solid #5DCAA5;align-self:flex-start}

.chcard{border-radius:10px;padding:13px;border:1px solid rgba(0,0,0,.07);text-align:center;position:relative}
.rline{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#fff;border-radius:8px;border:1px solid #e8e8e8;margin-bottom:5px;position:relative}
.btn{padding:6px 13px;font-size:12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555;font-family:inherit;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:#f5f5f5}
.itbl{width:100%;font-size:13px;border-collapse:collapse}
.itbl td{padding:9px 10px;border-bottom:1px solid #f2f2f2;vertical-align:top}
.itbl td:first-child{color:#888;font-size:12px;width:140px;white-space:nowrap}
.itbl tr:last-child td{border-bottom:none}
.arrdn{text-align:center;color:#ccc;font-size:18px;margin:3px 0}
.dv{height:1px;background:#f0f0f0;margin:14px 0}
.mc{background:#fff;border:1px solid #e4e4e4;border-radius:12px;margin-bottom:12px;overflow:hidden;position:relative}
.mh{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:#f9faf9;border-bottom:1px solid #eee;gap:10px}
.mt{font-size:13px;font-weight:700}
.mb{padding:14px 16px}
.mtxt{font-size:12px;line-height:1.9;white-space:pre-wrap;background:#fafafa;border:1px solid #ebebeb;border-radius:8px;padding:12px 14px;margin-bottom:8px;font-family:-apple-system,'Malgun Gothic',sans-serif}
.mnote{font-size:11px;color:#999;line-height:1.6}
.cpybtn{padding:6px 14px;font-size:12px;font-weight:600;border-radius:6px;border:none;background:#1D9E75;color:#fff;cursor:pointer;font-family:inherit;flex-shrink:0}
.cpybtn:hover{background:#0F6E56}
.cpybtn.ok{background:#185FA5}
/* Edit mode styles */
.edit-ctrl{display:none;align-items:center;gap:4px;flex-shrink:0}
.edit-mode .edit-ctrl{display:flex}
.eic{width:24px;height:24px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:#666;flex-shrink:0}
.eic:hover{background:#f5f5f5}
.eic.del:hover{background:#FCEBEB;border-color:#f0a0a0;color:#A32D2D}
.add-btn{display:none;width:100%;padding:8px;font-size:12px;color:#0F6E56;background:#E1F5EE;border:1px dashed #5DCAA5;border-radius:8px;cursor:pointer;text-align:center;font-family:inherit;margin-top:6px}
.edit-mode .add-btn{display:block}
.add-btn:hover{background:#9FE1CB}

.routine-task{color:#1a1a1a}

#confirmOverlay.show{display:flex}

.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:#888;margin-bottom:5px;font-weight:500}
.modal-field input,.modal-field textarea,.modal-field select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff}
.modal-field input:focus,.modal-field textarea:focus{outline:none;border-color:#5DCAA5}
.modal-field textarea{height:140px;resize:vertical;line-height:1.7}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}

.modal-cancel{padding:8px 20px;background:transparent;color:#666;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
.modal-cancel:hover{background:#f5f5f5}
.color-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s}
.color-opt.selected{border-color:#1a1a1a;transform:scale(1.15)}

.loading{padding:60px 20px;text-align:center;color:#888;font-size:14px}

@media(max-width:640px){.g3{grid-template-columns:1fr}.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.content{padding:14px}}

messages:{
  "키즈노트":[
    {title:"유치부 · 신규생 첫등원 안내",tag:"키즈노트 알림장",tc:"teal",note:"담임 교사 확인 후 발송. 반 이름·담임교사·등원일 수정 필수.",text:"[ 첫 등원 안내문 ]\n\n안녕하세요, 학부모님.\n첫 등원 관련 아래와 같이 안내드리니 확인 후 준비하시기 바랍니다.\n첫 등원일은 [등원일]입니다.\n\n감사합니다.\n\n# 반 이름 : [반 이름]\n# 담임교사 : [담임교사]\n\n*** 등원 준비물 :\n모든 물품에는 반드시 이름을 기재하여 주시기 바랍니다.\n\n■ 매일 가방에 가지고 등원합니다. ■\n✓숟가락, 젓가락 또는 포크\n✓개인 물통\n✓L자 파일(원에서 배부)\n\n■ 보내주시면 원에 두고 사용합니다. ■\n✓실내화(슬리퍼형 X)_ 매주 금요일 세척을 위해 실내화 주머니에 보내드립니다.\n✓필통(연필 7자루, 지우개 2개)\n✓칫솔, 치약, 가글 컵\n✓여벌 옷(티셔츠, 바지, 속옷, 양말)\n✓색연필, 사인펜 (12색)\n   (원에서 배부 예정인 색연필, 사인펜은 원에서 사용하므로 각 색깔별로 이름 스티커를 부착하여 보내주세요.)\n\n■ 복장 안내 ■\n* 원 복: 월요일, 목요일\n* 체육복: 화요일, 금요일\n* 자유복: 수요일\n\n기타 궁금한 사항이 있으시면 원으로 전화 또는 키즈노트 알림장으로 문의하시면 자세히 안내하겠습니다.\n\n감사합니다."},
    {title:"유치부 · 원복 사이즈 신청",tag:"키즈노트 알림장",tc:"teal",note:"대면 등록 시 원복 사이즈를 바로 선택한 경우 발송 불필요.",text:"안녕하세요, 알티오라 위례입니다 😊\n\n원복 사이즈 신청 안내를 드립니다.\n\n▶ 원복 종류: 상의 / 하의 / 점퍼\n▶ 사이즈: 110 / 120 / 130 / 140\n▶ 신청 방법: 알림장 회신으로 사이즈 보내주세요.\n\n원복은 신청 후 [수령 예정일]에 배부해 드릴 예정입니다.\n\n감사합니다 🌿\n알티오라 위례 드림"},
    {title:"팬그램/팬그램키즈 · 신입생 안내",tag:"키즈노트 알림장",tc:"teal",note:"반 이름·등원일·영어이름·현금영수증번호·수업시간 수정 필수.",text:"◆ [반 이름] 신입생 안내문 ◆\n\n안녕하세요, [학부모님] 어머님.\n첫 등원일은 [등원일]로 등원일에 가지고 올 준비물을 안내드립니다.\n\n문의사항 있으신 경우, 원으로 전화 또는 알림장으로 문의하시면 자세한 답변드리겠습니다.\n\n감사합니다.\n\n\n[ 확인 사항 ]\n1. 첫 등원일에 팬그램키즈 가방 배부 예정입니다.\n2. 실내화는 원에 두고 다닙니다. (이름 반드시 기재)\n3. 첫 등원일에 배부하는 교재도 원에 두고 다니고, 숙제 또는 대여 도서만 가지고 다닙니다.\n4. 원에서 사용할 영어 이름은 [영어이름]으로 확인하였습니다.\n5. 현금영수증 발급 번호는 [현금영수증번호]로 확인하였습니다.\n   *** 발급 번호 변경 시에만 원으로 말씀해 주시면 되고, 매월 계좌이체 또는 현금 납부 내역은 일괄 발급됩니다.\n   *** 이미 납부하신 비용에 대한 현금영수증은 [등원일] 첫 등원일에 일괄 발급 예정이니 참고하시기 바랍니다.\n6. 셔틀은 [탑승여부]으로 확인하였습니다.\n7. 수업 시간은 [수업시간]으로 [도착시간]까지 원에 도착하실 수 있도록 부탁드립니다.\n8. 키즈노트 반은 [이동예정일]에 배정 반([반 이름])으로 이동 예정입니다."},
    {title:"페타무스 · 신입생 안내",tag:"키즈노트 알림장",tc:"teal",note:"⚠️ Grace T.와 cross-check 후 발송. 영어이름·현금영수증번호·등원일·반이름 수정 필수.",text:"안녕하세요, [학부모님] 어머님.\nPetamus 신입생 안내 드립니다.\n\n첫 등원일은 [등원일]입니다.\n\n문의사항 있으신 경우, 본원으로 전화 또는 알림장으로 문의하시면 자세한 답변 드리겠습니다.\n\n감사합니다.\n\n\n[ 확인 사항 ]\n1. 가방 및 교재 배부에 대해서는 오늘 오전에 담당 선생님께서 전화 안내 예정입니다.\n2. 원에서 사용할 영어 이름은 [영어이름]으로 확인하였습니다.\n3. 현금영수증 발급 번호는 [현금영수증번호]로 확인하였습니다.\n   *** 발급 번호 변경 시에만 원으로 말씀해 주시면 되고, 매월 계좌이체 또는 현금 납부 내역은 일괄 발급됩니다.\n   *** 이미 납부하신 비용에 대한 현금영수증은 [등원일] 첫 등원일에 일괄 발급 예정이니 참고하시기 바랍니다.\n4. 셔틀은 이용하지 않고, 개별 등 & 개별 하원으로 확인하였습니다.\n5. 키즈노트 알림장은 [이동예정일]에 배정 반([반 이름])으로 반 이동 예정입니다.\n\n감사합니다."},
    {title:"원공지 · 키즈아머 정기소독",tag:"키즈노트 원공지",tc:"blue",note:"소독일 전날 또는 당일 오전 업로드.",text:"안녕하세요, 알티오라 위례입니다 😊\n\n정기 원내 소독 일정을 안내드립니다.\n\n▶ 소독 일시: [날짜] 오후 7시\n▶ 소독 업체: 키즈아머\n▶ 소독 범위: 원내 전체\n\n이용에 참고 부탁드립니다.\n감사합니다 🌿\n알티오라 위례 드림"},
    {title:"원공지 · 휴원일 안내",tag:"키즈노트 원공지",tc:"blue",note:"원장님 요청 시 제작하여 공지.",text:"안녕하세요, 알티오라 위례입니다 😊\n\n휴원 일정을 안내드립니다.\n\n▶ 휴원일: [날짜]\n▶ 재원일: [날짜]부터 정상 운영\n\n이용에 참고 부탁드립니다.\n감사합니다 🌿\n알티오라 위례 드림"},
    {title:"퇴원 안내 (키즈노트 알림장)",tag:"키즈노트 알림장 (개별)",tc:"red",note:"퇴원 확정 후 발송. 반납 도서 수·환불 내역 수정 필수.",text:"◆ 퇴원 및 도서 반납 안내 ◆\n\n안녕하세요, [원생이름] 어머님.\n[마지막등원일]이 [원생이름] 마지막 등원일로 말씀주셔서 퇴원 안내드립니다.\n\n내일 사용하던 교재 및 실내화는 담임 선생님께 생겨주실 예정이고, 키즈노트는 [퇴소처리일]에 퇴소처리 예정입니다.\n퇴소처리하면 이전 남긴 글들은 모두 주역 보기에서 열람하실 수 있으니 참고 바랍니다.\n\n환불일은 매주 금요일 내역 안내드리며, 키즈노트에 남겨주신 계좌로 [환불일]에 환불 송금하겠습니다.\n\n* [은행명] [계좌번호] [예금주] 님\n\n아직 반납하지 않은 도서가 [미반납권수]권 있는 것으로 확인되니 마지막 등원 시 꼭 도서 반납 부탁드립니다.\n(미반납 도서는 권당 10,000원씩 도서보증금에서 차감)\n\n그동안 알티오라 위례와 함께해 주셔서 진심으로 감사드리며, [원생이름]의 건강하고 밝은 성장을 진심으로 응원하겠습니다.\n\n감사합니다.\n\n■ 환불 내역 안내\n1. 도서보증금(모든 대여 도서 반납 시): [금액]원\n2. 잔여 수업비용(총 [회수]회): [금액]원\n3. 오후 돌봄 비용(총 [회수]회): [금액]원\n4. 셔틀비([해당월]분): [금액]원\n5. 교재비([해당월]분): [금액]원\n6. 재비([해당기간]): [금액]원\n[ 총 환불 금액: [총금액]원 ]\n\n※ 미반납 도서는 마지막 등원 시 꼭 가지고 올 수 있도록 가방에 넣어서 보내주시면 감사하겠습니다."}

  "교사방":[

  "sms":[
    {title:"수납 안내 문자 (납부 안내일 오전 10시)",tag:"SMS 발송 (오전 10:00)",tc:"amber",note:"익월 학사 시작일 2주일~10일 전 발송. 실제 금액은 [문자 전송 내역] 파일 참고.",text:"[알티오라 위례] 안녕하세요, 학부모님.\n\n[월] 교습비 납부 안내드립니다.\n\n▶ 납부 금액: [금액]원\n▶ 납부 기한: [마감일]\n▶ 입금 계좌: 국민은행 045537-04-004674 (알티오라)\n▶ 신용카드 결제: 통통통 앱 이용 가능\n\n문의: 031-778-6655"},
    {title:"납부 마감 안내 문자 (마감일 오전 10시)",tag:"SMS 발송 (오전 10:00)",tc:"amber",note:"납부 마감일 오전 10시 발송.",text:"[알티오라 위례] 안녕하세요, 학부모님.\n\n[월] 교습비 납부 마감일 안내드립니다.\n\n▶ 마감일: 오늘([날짜])까지\n▶ 입금 계좌: 국민은행 045537-04-004674 (알티오라)\n\n이미 납부하신 경우 양해 부탁드립니다.\n문의: 031-778-6655"},
    {title:"미납자 개별 안내 (키즈노트 알림장)",tag:"키즈노트 알림장 (개별)",tc:"red",note:"납부 마감일 다음날 오전 11시. 개인별 키즈노트 알림장으로 발송.",text:"안녕하세요, 알티오라 위례입니다.\n\n[원생 이름] 학부모님,\n[월] 교습비가 아직 미납 상태입니다.\n\n▶ 납부 금액: [금액]원\n▶ 입금 계좌: 국민은행 045537-04-004674 (알티오라)\n▶ 신용카드 결제: 통통통 앱 이용 가능\n\n빠른 시일 내 납부 부탁드립니다.\n감사합니다.\n알티오라 위례 드림"},

  "카톡":[
    {title:"주간 상담 보고 (매주 금요일)",tag:"4번 카톡방",tc:"teal",note:"매주 금요일 이사장님/Elly/Hetty/Anna 카톡방에 발송.",text:"안녕하세요, [날짜] 주간 상담 보고 드립니다.\n\n▶ 유치부: [건수]건 — [내용 요약]\n▶ 팬그램: [건수]건 — [내용 요약]\n▶ 페타무스: [건수]건 — [내용 요약]\n\n▶ 등록 확정: [건수]건 ([원생명])\n▶ 진행 중: [건수]건\n\n이상입니다. 감사합니다 😊"},
    {title:"월말 신규생·퇴원생 보고 (매월 말일)",tag:"4번 카톡방",tc:"teal",note:"매월 말일 이사장님/Elly/Hetty/Anna 카톡방에 발송.",text:"안녕하세요, [월] 말 현황 보고 드립니다.\n\n▶ 신규 등록\n  - 유치부: [건수]명 ([원생명])\n  - 팬그램: [건수]명 ([원생명])\n  - 페타무스: [건수]명 ([원생명])\n\n▶ 퇴원\n  - 유치부: [건수]명 ([원생명], 퇴원일)\n  - 팬그램: [건수]명 ([원생명], 퇴원일)\n  - 페타무스: [건수]명 ([원생명], 퇴원일)\n\n이상입니다. 감사합니다 😊"},
    {title:"수납 완료 보고 (이사장님 개인 카톡)",tag:"이사장님 개인 카톡",tc:"teal",note:"해당 월 수납 완료 후 이사장님 개인 카톡으로 보고.",text:"안녕하세요, 이사장님.\n[월] 수납 완료 보고 드립니다.\n\n▶ 유치부: [금액]원\n▶ 팬그램: [금액]원\n▶ 페타무스: [금액]원\n▶ 합계: [금액]원\n\n이상입니다. 감사합니다 😊"},

// ─── FIREBASE HELPERS ──────────────────────────────────────
function fbSave(path, val) {
  if (!S.offline && db) {
    try { db.ref(path).set(val); } catch(e) { console.warn("fbSave:",e); }
  }
  try { localStorage.setItem("altiora_admin_data", JSON.stringify(S.d)); } catch(e) {}
  render();
}

function deepGet(obj, path) {
  var parts = path.split("/");
  var cur = obj;
  for (var i = 0; i < parts.length; i++) {
    if (cur == null) return null;
    cur = cur[parts[i]];
  }
  return cur;
}

function deepSet(obj, path, val) {
  var parts = path.split("/");
  var cur = obj;
  for (var i = 0; i < parts.length - 1; i++) {
    if (!cur[parts[i]]) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = val;
}

function arrClone(v) { return JSON.parse(JSON.stringify(v || [])); }

// ─── INIT ──────────────────────────────────────────────────
function editOnlyBtn(act, ds) {
  var attrs = "";
  var keys = Object.keys(ds);
  for (var i = 0; i < keys.length; i++) {
    attrs += " data-" + keys[i] + '="' + escHtml(String(ds[keys[i]])) + '"';
  }
  return '<div class="edit-ctrl"><button class="eic" data-act="' + act + '"' + attrs + ' title="수정">✏️</button></div>';
}

function render() {
  var app = document.getElementById("app");
  if (S.editMode) app.classList.add("edit-mode");
  else app.classList.remove("edit-mode");

  var eb = document.getElementById("editBtn");
  if (eb) {
    eb.textContent = S.editMode ? "✏️ 편집 종료" : "✏️ 편집 모드";
    eb.classList.toggle("active", S.editMode);
  }

  var banner = document.getElementById("editBanner");
  if (banner) {
    if (S.editMode) {
      document.getElementById("app").classList.add("edit-mode-on");
      banner.style.display = "block";
    } else {
      document.getElementById("app").classList.remove("edit-mode-on");
      banner.style.display = "none";
    }
  }

  var th = "";
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    th += '<button class="tab' + (S.aTab === t.id ? " active" : "") + '" data-tab="' + t.id + '">' + t.lbl + '</button>';
  }
  document.getElementById("tabs").innerHTML = th;

  var c = document.getElementById("content");
  if (!S.loaded) {
    c.innerHTML = '<div class="loading">데이터 불러오는 중...</div>';
    return;
  }
  if (S.aTab === "home")       c.innerHTML = rHome();
  else if (S.aTab === "consult")    c.innerHTML = rConsult();
  else if (S.aTab === "register")   c.innerHTML = rReg();
  else if (S.aTab === "checklist")  c.innerHTML = rCL();
  else if (S.aTab === "payment")    c.innerHTML = rPay();
  else if (S.aTab === "messages")   c.innerHTML = rMsgs();
  else                               c.innerHTML = rQRef();
}

// ─── EVENT DELEGATION ──────────────────────────────────────
document.addEventListener("click", function(e) {
  var el = e.target;
  while (el && el !== document) {
    var act = el.dataset.act;
    if (act) { handleAction(act, el.dataset); return; }
    if (el.dataset.tab) { S.aTab = el.dataset.tab; render(); return; }
    if (el.dataset.reg) { S.regProg = el.dataset.reg; render(); return; }
    if (el.dataset.cat) { S.checkCat = el.dataset.cat; render(); return; }
    if (el.dataset.pay) { S.payS = el.dataset.pay; render(); return; }
    if (el.dataset.msg) { S.msgCat = el.dataset.msg; render(); return; }
    if (el.dataset.ref) { S.openRef = S.openRef === el.dataset.ref ? null : el.dataset.ref; render(); return; }
    if (el.dataset.ck)  { var k = el.dataset.ck; S.chk[k] = !S.chk[k]; render(); return; }
    if (el.dataset.rst) { Object.keys(S.chk).forEach(function(k){ if(k.indexOf(S.checkCat+"_")===0) delete S.chk[k]; }); render(); return; }
    if (el.dataset.cpy !== undefined) { copyMsg(parseInt(el.dataset.cpy)); return; }
    if (el.id === "editBtn") { S.editMode = !S.editMode; render(); return; }
    if (el.tagName === "A") return;
    el = el.parentElement;
  }
});

// ─── MODAL ─────────────────────────────────────────────────
var confirmCb = null;
function showConfirm(msg, cb) {
  confirmCb = cb;
  document.getElementById("confirm-msg").innerHTML =
    '<div style="font-size:28px;margin-bottom:12px">🗑️</div>' +
    '<div style="font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:8px">삭제 확인</div>' +
    '<div style="font-size:13px;color:#666;line-height:1.7">' + msg + '</div>';
  document.getElementById("confirmOverlay").classList.add("show");
}
function doConfirm() {
  document.getElementById("confirmOverlay").classList.remove("show");
  if (confirmCb) { var cb = confirmCb; confirmCb = null; cb(); }
}
function closeConfirm() {
  document.getElementById("confirmOverlay").classList.remove("show");
  confirmCb = null;
}
var modalCb = null;

function openModal(title, fields, onSave) {
  modalCb = onSave;
  var fhtml = "";
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    fhtml += '<div class="modal-field"><label>' + f.label + '</label>';
    if (f.type === "text") {
      fhtml += '<input id="mf_' + f.id + '" type="text" value="' + escHtml(f.value || "") + '" placeholder="' + escHtml(f.ph || "") + '">';
    } else if (f.type === "textarea") {
      fhtml += '<textarea id="mf_' + f.id + '" placeholder="' + escHtml(f.ph || "") + '">' + escHtml(f.value || "") + '</textarea>';
    } else if (f.type === "select") {
      fhtml += '<select id="mf_' + f.id + '" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit">';
      (f.options||[]).forEach(function(opt) {
        fhtml += '<option value="' + escHtml(opt) + '"' + (f.value===opt?' selected':'') + '>' + escHtml(opt) + '</option>';
      });
      fhtml += '</select>';
    } else if (f.type === "color") {
      var colors = ["teal","blue","purple","amber","red","gray"];
      fhtml += '<div class="color-options" id="mf_' + f.id + '" data-val="' + (f.value||"teal") + '">';
      for (var j = 0; j < colors.length; j++) {
        var cname = colors[j];
        var c = SC[cname];
        fhtml += '<div class="color-opt' + (f.value === cname ? " selected" : "") + '" style="background:' + c.bg + ';border-color:' + c.b + '" data-color="' + cname + '" data-field="mf_' + f.id + '" onclick="pickColor(this)"></div>';
      }
      fhtml += '</div>';
    }
    fhtml += '</div>';
  }
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalFields").innerHTML = fhtml;
  document.getElementById("modalOverlay").classList.add("show");
  var firstInput = document.querySelector("#modalFields input, #modalFields textarea");
  if (firstInput) setTimeout(function(){ firstInput.focus(); }, 50);
}

function pickColor(el) {
  var fieldId = el.dataset.field;
  var container = document.getElementById(fieldId);
  container.dataset.val = el.dataset.color;
  var opts = container.querySelectorAll(".color-opt");
  for (var i = 0; i < opts.length; i++) opts[i].classList.remove("selected");
  el.classList.add("selected");
}

function saveModal() {
  if (!modalCb) return;
  var fields = document.querySelectorAll("#modalFields [id^='mf_']");
  var vals = {};
  for (var i = 0; i < fields.length; i++) {
    var el = fields[i];
    var key = el.id.replace("mf_", "");
    if (el.classList.contains("color-options")) {
      vals[key] = el.dataset.val || "teal";
    } else {
      vals[key] = el.value;
    }
  }
  modalCb(vals);
  closeModal();
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("show");
  modalCb = null;
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeModal(); closeConfirm(); }
});

// ─── HELPERS ───────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function ectrls(actEdit, actDel, ds) {
  var attrs = "";
  var keys = Object.keys(ds);
  for (var i = 0; i < keys.length; i++) attrs += " data-" + keys[i] + '="' + escHtml(ds[keys[i]]) + '"';
  return '<div class="edit-ctrl">'
    + '<button class="eic" data-act="' + actEdit + '"' + attrs + ' title="수정">✏️</button>'
    + '<button class="eic del" data-act="' + actDel + '"' + attrs + ' title="삭제">🗑️</button>'
    + '</div>';
}

function addBtn(label, actName, ds) {
  var attrs = "";
  var keys = Object.keys(ds);
  for (var i = 0; i < keys.length; i++) attrs += " data-" + keys[i] + '="' + escHtml(ds[keys[i]]) + '"';
  return '<button class="add-btn" data-act="' + actName + '"' + attrs + '>' + label + '</button>';
}

function stepFlow(steps, actEdit, actDel, actAdd, dsBase, sm) {
  var h = '<div class="sflow">';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i], c = SC[s.c] || SC.gray;
    var sz = sm ? 24 : 30, fs = sm ? 11 : 12, pad = sm ? "8px 12px" : "10px 14px", br = sm ? 8 : 10;
    var mb = (i < steps.length - 1) ? ";margin-bottom:0" : "";
    h += '<div class="sitem">';
    h += '<div style="display:flex;flex-direction:column;align-items:center;width:' + sz + 'px;flex-shrink:0">';
    h += '<div style="width:' + sz + 'px;height:' + sz + 'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:' + fs + 'px;font-weight:700;flex-shrink:0;background:' + c.bg + ';color:' + c.t + ';border:1.5px solid ' + c.b + '">' + (s.n || i + 1) + '</div>';
    if (i < steps.length - 1) h += '<div style="width:1.5px;background:' + c.b + ';margin:2px auto;flex:1;min-height:8px"></div>';
    h += '</div>';
    var dsStep = Object.assign({}, dsBase, {idx: i});
    h += '<div class="sbody' + (sm ? " sm" : "") + '" style="border-left:3px solid ' + c.b + ';padding:' + pad + ';border-radius:' + br + 'px' + mb + '">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';

// ─── MEMO ─────────────────────────────────────────────────
function saveMemo() {
  var area = document.getElementById("memoArea");
  if (!area) return;
  var val = area.value;
  S.d.memo = val;
  if (!S.offline && db) { try { db.ref("memo").set(val); } catch(e){} }
  try { localStorage.setItem("altiora_admin_data", JSON.stringify(S.d)); } catch(e) {}
  // 저장 완료 표시
  var btn = document.querySelector('button[onclick="saveMemo()"]');
  if (btn) { btn.textContent = "✓ 저장됨"; setTimeout(function(){ btn.textContent = "💾 저장"; }, 1500); }
}

function clearMemo() {
  if (!confirm("메모를 삭제할까요?")) return;
  S.d.memo = "";
  if (!S.offline && db) { try { db.ref("memo").set(""); } catch(e){} }
  try { localStorage.setItem("altiora_admin_data", JSON.stringify(S.d)); } catch(e) {}
  render();
}

    h += '<div><div class="slbl">알티오라 본사 교재 (러닝앤코)</div>';
    h += stepFlow(pr.lnc||[], "editPayStep","delPayStep","addPayStep",{src:"payment/교재반품/lnc"}, true);
    h += '</div><div><div class="slbl">이엠북스 외부 교재</div>';
    h += stepFlow(pr.emc||[], "editPayStep","delPayStep","addPayStep",{src:"payment/교재반품/emc"}, true);
    h += '</div></div>';
  } else {
    var src = "payment/" + S.payS;
    var steps = deepGet(S.d, src) || [];
    h += stepFlow(steps, "editPayStep","delPayStep","addPayStep",{src:src});
    if (S.payS === "환불")
      var envNote = (S.d.notes||{}).pay_warn_환불 || "⚠️ 환불 요청일: 매주 금요일\n중간에 요청하지 않고 금요일에 모아서 한 번에 요청";
    h += '<div style="height:12px"></div>';
    h += '<div class="al al-a" style="position:relative">';
    h += '<div style="display:flex;justify-content:space-between;align-items:flex-start"><strong>참고</strong>' + editOnlyBtn("editNote",{nk:"pay_warn_환불"}) + '</div>';
    h += '<div style="margin-top:5px;font-size:12px;white-space:pre-line">' + escHtml(envNote) + '</div></div>';
  }
  return h;
}

// ─── MESSAGES ──────────────────────────────────────────────
function rMsgs() {
  var cats = [
    {k:"키즈노트",l:"키즈노트 알림장"},
    {k:"교사방",l:"전체교사방 공지"},
    {k:"sms",l:"SMS 수납 안내"},
    {k:"카톡",l:"카톡 보고·결제"}
  ];
  var msgs = S.d.messages[S.msgCat] || [];
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h += '<div class="stit" style="margin:0">메시지 템플릿</div><span style="font-size:11px;color:#999">[대괄호] 수정 후 복사</span></div>';
  h += '<div class="segs">';
  for (var i = 0; i < cats.length; i++)
    h += '<button class="seg' + (S.msgCat === cats[i].k ? " active" : "") + '" data-msg="' + cats[i].k + '">' + cats[i].l + '</button>';
  h += '</div>';
  h += '<div class="al al-b" style="margin-bottom:14px;font-size:12px"><strong>사용 방법:</strong> [대괄호] 안의 내용을 실제 정보로 바꾼 후 📋 복사 버튼을 눌러 붙여넣기 하세요.</div>';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var hi = escHtml(m.text).replace(/\[([^\]]+)\]/g, '<span style="color:#0F6E56;font-weight:600;background:#E1F5EE;padding:0 2px;border-radius:3px">[$1]</span>');
    h += '<div class="mc"><div class="mh">';
    h += '<div style="flex:1"><div class="mt">' + escHtml(m.title) + '</div>';
    h += '<span class="pill" style="background:' + (tagBg[m.tc]||"#eee") + ';color:' + (tagTc[m.tc]||"#555") + ';margin-top:3px;display:inline-block">' + escHtml(m.tag) + '</span></div>';
    h += '<div style="display:flex;gap:6px;align-items:center">';
    h += ectrls("editMsg","delMsg",{cat:S.msgCat,idx:i});
    h += '<button class="cpybtn" data-cpy="' + i + '">📋 복사</button></div></div>';
    h += '<div class="mb"><div class="mtxt">' + hi + '</div>';
    if (m.note) h += '<div class="mnote">💡 ' + escHtml(m.note) + '</div>';
    h += '</div></div>';
  }
  h += addBtn("+ 템플릿 추가","addMsg",{cat:S.msgCat});
  return h;
}

// ─── QUICK REF ─────────────────────────────────────────────
function rQRef() {
  var qr = S.d.quickref || [];
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h += '<div class="stit" style="margin:0">빠른 참조</div>';
  h += '<button class="edit-ctrl" data-act="addFormsSec" style="padding:5px 12px;font-size:11px;font-weight:600;border:1px solid #85B7EB;background:#E6F1FB;color:#185FA5;border-radius:6px;cursor:pointer;font-family:inherit">📄 서식 섹션 추가</button>';
  h += '</div>';
  h += '<div style="display:flex;flex-direction:column;gap:6px">';
  for (var si = 0; si < qr.length; si++) {
    var sec = qr[si];
    h += '<div>';
    h += '<div class="achdr" data-ref="' + escHtml(sec.id) + '">';
    h += '<div style="display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600"><span>' + sec.ic + '</span><span>' + escHtml(sec.ti) + '</span></div>';
    h += '<div style="display:flex;align-items:center;gap:6px">';
    h += ectrls("editQSec","delQSec",{si:si});
    h += '<span style="color:#bbb;font-size:16px">' + (S.openRef === sec.id ? "▲" : "▼") + '</span>';
    h += '</div></div>';
    if (S.openRef === sec.id) {
      h += '<div class="abody">';
      for (var ri = 0; ri < sec.rows.length; ri++) {
        var row = sec.rows[ri];
        h += '<div class="rrow" style="' + (ri === sec.rows.length-1 ? "border:none" : "") + '">';
        h += '<div class="rlbl">' + escHtml(row.label) + '</div>';
        h += '<div class="rval">';
        if (row.url) {
          var isForm = sec.id === "forms";
          var linkLabel = isForm ? "📂 열기 / 인쇄" : "🔗 " + extractDomain(row.url);
          h += '<a href="' + escHtml(row.url) + '" target="_blank" rel="noopener" class="rlink" style="' + (isForm ? "background:#E6F1FB;color:#185FA5;border-color:#85B7EB" : "") + '">' + linkLabel + '</a>';
        }
        if (row.text) h += '<span>' + escHtml(row.text) + '</span>';
        if (!row.url && sec.id === "forms") h += '<span style="font-size:11px;color:#ccc;padding:2px 8px;border:1px dashed #ddd;border-radius:20px">📂 링크 미설정</span>';
        h += '</div>';
        h += ectrls("editQRow","delQRow",{si:si,ri:ri});
        h += '</div>';
      }
      h += addBtn("+ 항목 추가","addQRow",{si:si});
      h += '</div>';
    }
    h += '</div>';
  }
  h += addBtn("+ 섹션 추가","addQSec",{});
  h += '</div>';
  return h;
}

function extractDomain(url) {
  try {
    var m = url.match(/^https?:\/\/([^\/]+)/);
    return m ? m[1].replace("www.","") : url;
  } catch(e) { return url; }
}

// ─── COPY MSG ──────────────────────────────────────────────
function copyMsg(idx) {
  var msgs = S.d.messages[S.msgCat];
  if (!msgs || !msgs[idx]) return;
  var txt = msgs[idx].text;
  var btn = document.querySelector("[data-cpy='" + idx + "']");
  function fb() {
    if (btn) {
      btn.textContent = "✓ 복사됨!";
      btn.classList.add("ok");
      setTimeout(function(){ btn.textContent = "📋 복사"; btn.classList.remove("ok"); }, 1800);
    }
  }
  try {
    navigator.clipboard.writeText(txt).then(fb).catch(function(){
      var ta = document.createElement("textarea");
      ta.value = txt; ta.style.cssText = "position:fixed;left:-9999px;opacity:0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); fb();
    });
  } catch(x) {
    var ta = document.createElement("textarea");
    ta.value = txt; ta.style.cssText = "position:fixed;left:-9999px;opacity:0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy");
    document.body.removeChild(ta); fb();
  }
}

var _ls = null;
try { var _r = localStorage.getItem("altiora_admin_data"); if(_r) _ls = JSON.parse(_r); } catch(e) {}
S.d = _ls || JSON.parse(JSON.stringify(DEF));
S.loaded = true;
S.offline = true;
render();

// Firebase 동적 로드 (백그라운드)
function connectFirebase() {
  try {
    if (typeof firebase !== "undefined" && !firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CFG);
    }
    db = firebase.database();
    db.ref("/").once("value", function(snap) {
      try {
        var val = snap.val();
        if (!val || !val.routines) {
          // 첫 실행 - DEF 저장 후 온라인으로 전환
          db.ref("/").set(DEF, function() {
            S.offline = false;
            showOnlineBanner();
            render();
          });
        } else {
          S.d = val;
          S.offline = false;
          // Firebase 데이터로 localStorage도 업데이트
          try { localStorage.setItem("altiora_admin_data", JSON.stringify(val)); } catch(e) {}
          showOnlineBanner();
          render();
        }
      } catch(e2) {
        console.warn("FB data err:", e2);
        showOfflineBanner();
      }
    }, function(err) {
      console.warn("FB read err:", err);
      showOfflineBanner();
    });
  } catch(e) {
    console.warn("FB connect err:", e);
    showOfflineBanner();
  }
}

function showOnlineBanner() {}

// Firebase 연결 시도
if (window._fbErr || typeof firebase === "undefined") {
  showOfflineBanner();
} else if (window.location.protocol === "file:") {
  showOfflineBanner();
} else {
  connectFirebase();
}

</script>
